<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/mondomago/favicon.svg" />
    <link rel="apple-touch-icon" href="/mondomago/apple-touch-icon.png" />
    <link rel="manifest" href="/mondomago/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MondoMago" />
    <title>MondoMago</title>
    <style>
      :root { --font-display: 'Fredoka One', cursive; }
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
        -webkit-touch-callout: none;
      }
      html {
        height: 100%;
        /* prevent elastic scroll bounce on iOS */
        overscroll-behavior: none;
      }
      body {
        font-family: 'Nunito', system-ui, sans-serif;
        background: #1a1a2e;
        overscroll-behavior: none;
        /* block pull-to-refresh and overscroll glow */
        overscroll-behavior-y: none;
        /* safe-area aware padding for notch phones */
        padding-top: var(--sat);
        padding-left: var(--sal);
        padding-right: var(--sar);
        /* DO NOT add padding-bottom here — screens handle it individually */
        min-height: 100dvh;
        min-height: 100vh; /* fallback for older browsers */
        /* prevent iOS text size adjustment */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
      }
      #root {
        min-height: 100dvh;
        min-height: 100vh;
        isolation: isolate;
      }
      /* Prevent text selection across all game UI */
      * {
        -webkit-user-select: none;
        user-select: none;
      }
      /* Re-enable selection only for text inputs */
      input, textarea {
        -webkit-user-select: text;
        user-select: text;
      }
      button, [role="button"] {
        font-family: 'Nunito', system-ui, sans-serif;
        cursor: pointer;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        border: none;
        background: none;
      }
      input {
        font-family: 'Nunito', system-ui, sans-serif;
        /* 16px minimum prevents iOS auto-zoom on focus */
        font-size: 16px;
      }
      /* Smooth scrolling for any scrollable containers */
      [data-scroll] {
        -webkit-overflow-scrolling: touch;
        scroll-behavior: smooth;
      }
      /* iOS safe area bottom padding helper class */
      .safe-bottom {
        padding-bottom: max(var(--sab), 16px);
      }
      /* Full-screen helper using dynamic viewport */
      .screen-full {
        min-height: 100dvh;
        min-height: 100vh;
        /* bottom padding so content isn't hidden behind home indicator */
        padding-bottom: max(var(--sab), 0px);
      }
    </style>
    <script type="module" crossorigin src="/mondomago/assets/index-Bj9IUjSO.js"></script>
    <link rel="stylesheet" crossorigin href="/mondomago/assets/index-C1mrqqk4.css">
  </head>
  <body>
    <!-- Branded splash: shown until React mounts, removes itself -->
    <div id="mm-splash" style="position:fixed;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .35s ease">
      <div style="font-size:80px;animation:bounce 1s ease-in-out infinite">🧙‍♂️</div>
      <div style="font-family:'Fredoka One',cursive;font-size:34px;color:white;margin-top:14px;letter-spacing:0.5px">MondoMago</div>
      <div style="font-family:'Nunito',system-ui,sans-serif;font-size:14px;color:rgba(255,255,255,.45);margin-top:6px">Il mondo magico ti aspetta ✨</div>
      <style>@keyframes bounce{0%,100%{transform:translateY(0)}40%{transform:translateY(-18px)}70%{transform:translateY(-8px)}}</style>
    </div>
    <main id="root"></main>
    <script>
      // Hide splash once the page is fully loaded
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('mm-splash');
          if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
        }, 500);
      });
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').then(reg => {
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              nw.addEventListener('statechange', () => {
                if (nw.state === 'installed' && navigator.serviceWorker.controller) {
                  const b = document.createElement('div');
                  b.id = 'mm-update-banner';
                  b.style.cssText = 'position:fixed;bottom:env(safe-area-inset-bottom,0px);left:0;right:0;background:#6C63FF;color:white;text-align:center;padding:12px;font-family:Nunito,sans-serif;font-size:14px;font-weight:700;z-index:99999;cursor:pointer';
                  b.textContent = '✨ Aggiornamento disponibile — tocca per ricaricare';
                  b.onclick = () => { nw.postMessage({type:'SKIP_WAITING'}); location.reload(); };
                  document.body.appendChild(b);
                }
              });
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
